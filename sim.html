<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Repair Bay &ndash; Basic 101 Repair Sim</title>
<link rel="stylesheet" href="assets/engine/style.css" />
<script type="importmap">
{
  "imports": {
    "three": "./assets/vendor/three.module.min.js"
  }
}
</script>
</head>
<body>
  <div id="sim-shell">
    <div id="viewport-col">
      <div id="viewport"></div>
      <div id="viewport-hud">
        <a href="index.html" class="back-link">&larr; Back to categories</a>
        <div class="ticket-chip" id="hud-title">Loading&hellip;</div>
      </div>
      <div class="spin-hint">Drag to rotate &middot; scroll to zoom &middot; click parts to interact</div>
    </div>
    <div id="panel-col">
      <div id="step-progress" class="step-progress"></div>
      <div id="panel-mount"></div>
    </div>
  </div>

  <script type="module">
    import { startSimulator } from "./assets/engine/engine.js";

    const REGISTRY = {
      "tower-no-post": "./assets/scenarios/tower-no-post.js",
      "laptop-no-power": "./assets/scenarios/laptop-no-power.js",
      "workstation-no-post": "./assets/scenarios/workstation-no-post.js",
      "printer-no-power": "./assets/scenarios/printer-no-power.js",
    };

    const params = new URLSearchParams(window.location.search);
    const key = params.get("scenario") || "tower-no-post";
    const scenarioPath = new URL(REGISTRY[key] || REGISTRY["tower-no-post"], import.meta.url).href;

    startSimulator({
      scenarioPath,
      viewportEl: document.getElementById("viewport"),
      panelEl: document.getElementById("panel-mount"),
      hudTitleEl: document.getElementById("hud-title"),
    }).catch((err) => {
      document.getElementById("panel-mount").innerHTML =
        `<div class="feedback-banner bad">Failed to load scenario: ${err.message}</div>`;
      console.error(err);
    });
  </script>
</body>
</html>
